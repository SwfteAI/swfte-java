name: Release

# Tag-based releases require manual approval before any publish runs.
# The publish job is gated by a GitHub Environment named `maven-publish-prod`
# with required reviewers (configured under Settings → Environments).
# Without that approval, the job pauses indefinitely and nothing reaches
# Maven Central / OSSRH.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PUBLISH to confirm an intentional release'
        required: true

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm intentional manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PUBLISH" ]; then
            echo "::error::Manual run requires confirm=PUBLISH"
            exit 1
          fi
      - run: echo "Release guard passed for ${GITHUB_REF}"

  publish:
    runs-on: ubuntu-latest
    needs: guard
    environment:
      name: maven-publish-prod
      url: https://central.sonatype.com/artifact/com.swfte/swfte-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build and deploy to Maven Central
        run: mvn deploy -B -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
